<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truy xuất nguồn gốc</title>
    <link rel="stylesheet" href="src/assets/css/search.css" />
</head>
<body class="search-shell">
    <div class="search-header">
        <div class="search-logo" aria-hidden="true">🔲</div>
        <h1 class="search-title">Truy xuất nguồn gốc</h1>
        <p class="search-subtitle">Nhập mã định danh sản phẩm hoặc quét mã QR trên bao bì để xem thông tin chi tiết.</p>
    </div>

    <div class="search-card">
        <div class="search-input-wrapper">
            <span class="search-icon">🔍</span>
            <input class="input" type="text" id="searchInput" placeholder="Nhập mã sản phẩm (VD: BAT-1234)" />
        </div>

        <div class="action-btns" style="display:flex; gap:10px; margin-bottom: 6px;">
            <button class="btn btn-primary btn-full" id="searchBtn" type="button">Tra cứu thông tin</button>
            <button class="btn btn-secondary btn-full" type="button" aria-label="Tính năng đang phát triển">📷 Quét mã QR</button>
        </div>

        <div class="history">
            <div class="history-title">🌱 Nông sản mới nhất từ hệ thống:</div>
            <div id="public-product-list" class="public-products">
                <div class="empty-state">Đang tải dữ liệu...</div>
            </div>
            <div class="chip">ID: BAT-1234 (Rau cải xanh)</div>
        </div>
    </div>

    <a href="login.html" class="back-link">Quay lại trang đăng nhập</a>

    <script src="src/pages/search.js"></script>
</body>
</html>
