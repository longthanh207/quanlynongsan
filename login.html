<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập - Quản lý Nông sản</title>
    <link rel="stylesheet" href="src/assets/css/auth.css" />
</head>
<body class="auth-shell">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo" aria-hidden="true">🍃</div>
            <h1 class="auth-title">Quản lý Nông sản</h1>
            <p class="auth-subtitle">Đăng nhập vào hệ thống</p>
        </div>

        <form class="auth-form" id="loginForm">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" class="input" id="email" placeholder="example@email.com" required />
            </div>
            <div class="input-group">
                <label for="password">Mật khẩu</label>
                <input type="password" class="input" id="password" placeholder="••••••••" required />
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">
                <span>➔</span> Đăng nhập
            </button>
        </form>

        <hr style="margin:24px 0; border:0; border-top:1px solid #eef2f6;" />

        <p class="helper-text">Bạn là người tiêu dùng?</p>
        <button class="btn btn-accent btn-full" id="searchRedirect" type="button">
            <span>📥</span> Tra cứu nguồn gốc sản phẩm
        </button>

        <hr style="margin:24px 0; border:0; border-top:1px solid #eef2f6;" />

        <p class="helper-text">Đăng nhập nhanh với vai trò:</p>
        <div class="role-grid">
            <button class="btn btn-outline farmer" type="button" data-quickfill="nongdan@test.com">Nông dân</button>
            <button class="btn btn-outline censor" type="button" data-quickfill="kiemduyet@test.com">Kiểm duyệt</button>
            <button class="btn btn-outline admin" type="button" data-quickfill="admin@test.com">Quản trị viên</button>
        </div>

        <p class="helper-text">Chưa có tài khoản? <a class="muted-link" href="register.html">Đăng ký ngay</a></p>
    </div>

    <script src="src/pages/login.js"></script>
</body>
</html>
