<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Truy xuất nguồn gốc Nông sản</title>
    <link rel="stylesheet" href="src/assets/css/track.css" />
</head>
<body class="track-shell">
    <div class="card track-card">
        <div id="loading" class="loading">Đang tải thông tin lô hàng...</div>
        
        <div id="error-message" class="error-box">Không tìm thấy thông tin lô hàng này!</div>

        <div id="product-details">
            <div class="track-cover">
                <img id="p-image" src="" alt="Ảnh sản phẩm" />
            </div>
            <div class="track-body">
                <div class="pill" style="margin-bottom:10px;">🎫 Mã lô hàng <span id="p-batch">...</span></div>
                <h2 class="page-title" id="p-name" style="margin:0 0 8px;">Tên sản phẩm</h2>
                
                <div class="info-row">
                    <span class="info-label">Mã Nông dân</span>
                    <span class="info-value" id="p-farmer">...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Sản lượng</span>
                    <span class="info-value" id="p-quantity">...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Giá bán</span>
                    <span class="info-value" id="p-price">...</span>
                </div>
                <div class="info-row">
                    <span class="info-label">Ngày đóng gói</span>
                    <span class="info-value" id="p-date">...</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="src/pages/track.js"></script>
</body>
</html>
