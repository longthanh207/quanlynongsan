<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký - Quản lý Nông sản</title>
    <link rel="stylesheet" href="src/assets/css/auth.css" />
</head>
<body class="auth-shell">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo" aria-hidden="true">📝</div>
            <h1 class="auth-title">Tạo tài khoản mới</h1>
            <p class="auth-subtitle">Tham gia vào hệ thống Quản lý Nông sản</p>
        </div>

        <form id="registerForm" class="auth-form">
            <div class="input-group">
                <label for="reg-name">Họ và Tên</label>
                <input type="text" class="input" id="reg-name" placeholder="VD: Nguyễn Văn A" required />
            </div>
            <div class="input-group">
                <label for="reg-email">Email</label>
                <input type="email" class="input" id="reg-email" placeholder="example@email.com" required />
            </div>
            <div class="input-group">
                <label for="reg-password">Mật khẩu</label>
                <input type="password" class="input" id="reg-password" placeholder="••••••••" required />
            </div>
            <div class="input-group">
                <label for="reg-confirm">Xác nhận mật khẩu</label>
                <input type="password" class="input" id="reg-confirm" placeholder="••••••••" required />
            </div>
            
            <button type="submit" class="btn btn-primary btn-full" id="registerSubmit">
                Đăng ký ngay
            </button>
        </form>

        <p class="helper-text">Đã có tài khoản? <a class="muted-link" href="login.html">Đăng nhập</a></p>
    </div>

    <script src="src/pages/register.js"></script>
</body>
</html>
