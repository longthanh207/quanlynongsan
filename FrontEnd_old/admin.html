<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Central - Quản lý hệ thống</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f4f7f9; margin: 0; display: flex; height: 100vh; overflow: hidden; color: #333; }
        
        /* SIDEBAR (Bên trái) */
        .sidebar { width: 260px; background: #151521; color: #a1a1b5; display: flex; flex-direction: column; transition: 0.3s; }
        .sidebar-header { padding: 25px 20px; display: flex; align-items: center; gap: 15px; color: white; font-size: 20px; font-weight: bold; border-bottom: 1px solid #2b2b40;}
        .sidebar-header .icon { background: #8b5cf6; padding: 8px; border-radius: 8px; font-size: 16px; }
        .menu { padding: 20px 0; flex: 1; }
        .menu-item { padding: 15px 25px; display: flex; align-items: center; gap: 15px; cursor: pointer; font-weight: 500; transition: 0.2s; }
        .menu-item:hover { color: white; }
        .menu-item.active { background: #8b5cf6; color: white; border-radius: 0 25px 25px 0; margin-right: 20px;}
        
        .sidebar-footer { padding: 20px; border-top: 1px solid #2b2b40; }
        .admin-profile { background: #1e1e2d; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin-bottom: 15px;}
        .avatar-circle { width: 35px; height: 35px; background: white; color: #8b5cf6; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 18px;}
        .admin-info { flex: 1; }
        .admin-info h4 { margin: 0; color: white; font-size: 14px; }
        .admin-info p { margin: 0; font-size: 12px; }
        .logout-btn { color: #f87171; cursor: pointer; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 8px;}
        .logout-btn:hover { color: #ef4444; }

        /* MAIN CONTENT (Bên phải) */
        .main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 30px; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .top-bar h2 { margin: 0; font-size: 24px; color: #111; }
        .action-btns { display: flex; gap: 10px; }
        .btn { padding: 10px 18px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 14px; transition: 0.2s;}
        .btn-outline { background: white; border: 1px solid #ddd; color: #333; }
        .btn-outline:hover { background: #f1f1f1; }
        .btn-primary { background: #8b5cf6; color: white; }
        .btn-primary:hover { background: #7c3aed; }

        /* TAB CONTROLS */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* FILTER BAR */
        .filter-bar { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; }
        .search-box { flex: 1; position: relative; }
        .search-box input { width: 100%; padding: 12px 15px 12px 40px; border: 1px solid #eee; border-radius: 8px; box-sizing: border-box; outline: none; background: white; }
        .search-box::before { content: '🔍'; position: absolute; left: 15px; top: 12px; color: #aaa; }
        .filter-select { padding: 12px; border: 1px solid #eee; border-radius: 8px; background: white; outline: none; color: #555; }

        /* TABLE STYLE */
        .table-container { background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #fcfcfd; padding: 18px 20px; text-align: left; font-size: 13px; color: #888; border-bottom: 1px solid #f1f1f1; }
        td { padding: 15px 20px; border-bottom: 1px solid #f1f1f1; vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #fafafa; }

        /* USER INFO COLUMN */
        .user-cell { display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 16px; }
        .avatar-N { background: #f3e8ff; color: #8b5cf6; } /* Tím */
        .avatar-K { background: #e0e7ff; color: #4f46e5; } /* Xanh biển */
        .avatar-Q { background: #fce7f3; color: #db2777; } /* Hồng */
        .user-name { font-weight: bold; color: #222; margin-bottom: 3px; font-size: 15px;}
        .user-email { color: #888; font-size: 13px; }

        /* BADGES */
        .badge { padding: 5px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; }
        .badge-farmer { background: #dcfce7; color: #16a34a; }
        .badge-admin { background: #f3e8ff; color: #9333ea; }
        .badge-status { background: #dcfce7; color: #16a34a; border: 1px solid #bbf7d0;}
        .action-dot { cursor: pointer; color: #aaa; font-weight: bold; font-size: 18px; text-align: center; }
        .action-dot:hover { color: #333; }

        /* CARDS DUYỆT HÀNG (Tab Tổng quan) */
        .approval-card { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; }
        .approval-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 8px; margin-right: 15px;}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <div class="icon">🛡️</div>
            Admin Central
        </div>
        <div class="menu">
            <div class="menu-item" onclick="switchTab('tab-overview', this)">
                <span>📊</span> Tổng quan
            </div>
            <div class="menu-item active" onclick="switchTab('tab-users', this)">
                <span>👥</span> Người dùng
            </div>
            <div class="menu-item" onclick="alert('Tính năng đang phát triển!')">
                <span>🕒</span> Nhật ký hệ thống
            </div>
        </div>
        <div class="sidebar-footer">
            <div class="admin-profile">
                <div class="avatar-circle">Q</div>
                <div class="admin-info">
                    <h4 id="adminName">Admin</h4>
                    <p>Administrator</p>
                </div>
            </div>
            <div class="logout-btn" onclick="logout()">[→ Đăng xuất</div>
        </div>
    </div>

    <div class="main-content">
        
        <div id="tab-overview" class="tab-content">
            <div class="top-bar">
                <h2>Tổng quan hệ thống</h2>
                <button class="btn btn-outline" onclick="loadApprovalData()">Làm mới</button>
            </div>
            <div class="table-container" style="padding: 20px;">
                <h3 style="margin-top:0;">📦 Lô hàng chờ duyệt</h3>
                <div id="pending-list">Đang tải dữ liệu...</div>
            </div>
        </div>

        <div id="tab-users" class="tab-content active">
            <div class="top-bar">
                <h2>Quản lý người dùng</h2>
                <div class="action-btns">
                    <button class="btn btn-outline" onclick="loadUserData()">Làm mới</button>
                    <button class="btn btn-primary">👤+ Thêm người dùng</button>
                </div>
            </div>

            <div class="filter-bar">
                <div class="search-box">
                    <input type="text" placeholder="Tìm kiếm theo tên hoặc email...">
                </div>
                <select class="filter-select">
                    <option>Tất cả vai trò</option>
                    <option>Nông dân</option>
                    <option>Quản trị viên</option>
                </select>
                <button class="btn btn-outline">⚙ Lọc nâng cao</button>
                <button class="btn btn-outline">📄 Import Excel</button>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Người dùng</th>
                            <th>Vai trò</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th style="text-align: center;">Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="user-list">
                        </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="services/api.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
