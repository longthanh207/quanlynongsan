<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Nông dân - Team 1</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8f9fa; margin: 0; color: #333; }
        
        /* HEADER */
        .header { background: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .brand { display: flex; align-items: center; gap: 12px; }
        .logo { background: #e8f5e9; color: #00a65a; width: 40px; height: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px; }
        .user-info h2 { margin: 0; font-size: 16px; }
        .logout { color: #666; text-decoration: none; font-size: 14px; cursor: pointer; }

        /* TABS NAVIGATION */
        .tabs { background: white; padding: 0 30px; display: flex; gap: 30px; border-bottom: 1px solid #eee; }
        .tab { padding: 15px 0; color: #666; cursor: pointer; font-weight: 500; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab.active { color: #00a65a; border-bottom-color: #00a65a; }

        /* CONTENT AREA */
        .content { padding: 30px; max-width: 1200px; margin: auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* STATS CARDS (TAB TỔNG QUAN) */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .stat-card h3 { margin: 0; font-size: 13px; color: #888; }
        .stat-card .num { font-size: 24px; font-weight: bold; margin-top: 5px; }
        .stat-icon { width: 40px; height: 40px; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-size: 20px; }

        /* PRODUCT LIST (TAB SẢN PHẨM) */
        .panel { background: white; padding: 25px; border-radius: 12px; border: 1px solid #eee; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 20px; }
        .product-card { background: white; border-radius: 12px; border: 1px solid #eee; overflow: hidden; position: relative; transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 180px; object-fit: cover; }
        .card-body { padding: 15px; }
        
        /* STATUS BADGES */
        .badge { position: absolute; top: 15px; right: 15px; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-pending { background: #fff3e0; color: #ff9800; }
        .badge-approved { background: #e8f5e9; color: #2e7d32; }
        .badge-rejected { background: #ffebee; color: #c62828; }

        .btn-add { background: #00a65a; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        /* MODAL */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 400px; position: relative; }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <div class="logo">🌿</div>
            <div class="user-info">
                <h2 id="userName">Nông dân</h2>
            </div>
        </div>
        <a class="logout" onclick="logout()">[→ Đăng xuất]</a>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('tab-overview', this)">📊 Tổng quan</div>
        <div class="tab" onclick="switchTab('tab-products', this)">📦 Sản phẩm của tôi</div>
        <div class="tab" onclick="switchTab('tab-logs', this)">📝 Nhật ký mùa vụ</div>
        <div class="tab" onclick="switchTab('tab-settings', this)">⚙️ Cài đặt</div>
    </div>

    <div class="content">
        <div id="tab-overview" class="tab-content active">
            <div class="stats-grid">
                <div class="stat-card">
                    <div><h3>Tổng sản phẩm</h3><div class="num" id="stat-total">0</div></div>
                    <div class="stat-icon" style="background: #e3f2fd; color: #2196f3;">📦</div>
                </div>
                <div class="stat-card">
                    <div><h3>Đang chờ duyệt</h3><div class="num" id="stat-pending">0</div></div>
                    <div class="stat-icon" style="background: #fff3e0; color: #ff9800;">⏳</div>
                </div>
                <div class="stat-card">
                    <div><h3>Đã phê duyệt</h3><div class="num" id="stat-approved">0</div></div>
                    <div class="stat-icon" style="background: #e8f5e9; color: #00a65a;">✅</div>
                </div>
                <div class="stat-card">
                    <div><h3>Bị từ chối</h3><div class="num" id="stat-rejected">0</div></div>
                    <div class="stat-icon" style="background: #ffebee; color: #d32f2f;">❌</div>
                </div>
            </div>
            <div class="panel">
                <h3>Hoạt động gần đây</h3>
                <div id="recent-list">Đang tải...</div>
            </div>
        </div>

        <div id="tab-products" class="tab-content">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h3 style="margin:0;">Kho hàng của tôi</h3>
                <button class="btn-add" onclick="openModal()">+ Thêm sản phẩm</button>
            </div>
            <div class="product-grid" id="grid-container">
                </div>
        </div>

        <div id="tab-logs" class="tab-content"><h3>Chưa có nhật ký mùa vụ</h3></div>
        <div id="tab-settings" class="tab-content"><h3>Cài đặt tài khoản</h3></div>
    </div>

    <div class="modal" id="addModal">
        <div class="modal-content">
            <h3>Tạo lô hàng mới</h3>
            <form id="productForm">
                <input type="text" name="name" placeholder="Tên sản phẩm" required>
                <input type="number" name="quantity" placeholder="Số lượng" required>
                <input type="text" name="unit" placeholder="Đơn vị (kg, tấn...)" required>
                <input type="number" name="price" placeholder="Giá/Đơn vị" required>
                <input type="file" name="productImage" accept="image/*" required>
                <button type="submit" class="btn-add" style="width: 100%;">Gửi Admin phê duyệt</button>
                <button type="button" onclick="closeModal()" style="width: 100%; background:none; color:#666; border:none; margin-top:10px; cursor:pointer;">Hủy bỏ</button>
            </form>
        </div>
    </div>

    <script src="services/api.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
